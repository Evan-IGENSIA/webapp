name: DevSecOps Cloud Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-and-sast:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Requis par SonarCloud pour l'historique Git

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Installation et exécution des tests unitaires
        run: |
          npm install
          npm test

      - name: Analyse SAST via SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security-container:
    needs: test-and-sast
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker locale
        run: docker build -t my-app:${{ github.sha }} .

      - name: Scan de vulnérabilités Trivy (SCA/Container)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
